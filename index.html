<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FM Tactics Board - 양정고 새벽 축구반</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="main-header">
      <div class="logo-area">
        <span class="logo-fm">FM</span>
        <h1 class="logo-title">TACTICS BOARD</h1>
      </div>
      <div class="subtitle-area">
        <span class="subtitle-text">양정고 새벽 축구반 전술판</span>
      </div>
    </header>

    <!-- Quarter Selector Tabs -->
    <div class="quarter-tabs-bar">
      <button class="quarter-btn active" data-quarter="1">1쿼터</button>
      <button class="quarter-btn" data-quarter="2">2쿼터</button>
      <button class="quarter-btn" data-quarter="3">3쿼터</button>
      <button class="quarter-btn" data-quarter="4">4쿼터</button>
    </div>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Left: Pitch -->
      <section class="pitch-section">
        <div class="pitch-container">
          <div class="pitch" id="pitch">
            <!-- Pitch lines (drawn via CSS/SVG) -->
            <div class="pitch-line half-way"></div>
            <div class="pitch-line center-circle"></div>
            <div class="pitch-line penalty-area top"></div>
            <div class="pitch-line penalty-area bottom"></div>
            <div class="pitch-line goal-area top"></div>
            <div class="pitch-line goal-area bottom"></div>

            <!-- Position Guides (Dynamically rendered based on selected formation) -->
            <div class="guides-overlay" id="guidesOverlay"></div>
            
            <!-- Placed Players (Dynamically added here) -->
            <div class="players-overlay" id="playersOverlay"></div>
          </div>
        </div>
      </section>

      <!-- Right: Control Panel & Squad -->
      <section class="control-section">
        <!-- Tactics Selector -->
        <div class="panel tactics-panel">
          <h2 class="panel-title">전술 포메이션</h2>
          <div class="tactics-buttons">
            <button class="tactics-btn active" data-formation="4-4-2">4-4-2</button>
            <button class="tactics-btn" data-formation="4-3-3">4-3-3</button>
            <button class="tactics-btn" data-formation="3-5-2">3-5-2</button>
            <button class="tactics-btn" data-formation="4-2-3-1">4-2-3-1</button>
            <button class="tactics-btn" data-formation="5-3-2">5-3-2</button>
          </div>
        </div>

        <!-- Squad List -->
        <div class="panel squad-panel">
          <div class="panel-header">
            <h2 class="panel-title">선수 명단 (<span id="squadCount">0</span>명)</h2>
            <input type="text" id="playerSearch" class="search-input" placeholder="선수 이름 검색...">
          </div>
          <div class="squad-list" id="squadList">
            <!-- Player items will be rendered here -->
            <div class="loading">선수 명단을 불러오는 중...</div>
          </div>
        </div>

        <!-- Reset Button -->
        <div class="action-panel">
          <button id="resetBtn" class="reset-button">
            <svg class="reset-icon" viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
            <span>현재 쿼터 비우기</span>
          </button>
        </div>
      </section>
    </main>
  </div>

  <!-- JS -->
  <script src="app.js"></script>
</body>
</html>
