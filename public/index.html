<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FM Tactics Board - 조우킴 축구단</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="main-header">
      <div class="logo-area">
        <span class="logo-fm">FM</span>
        <h1 class="logo-title">TACTICS BOARD</h1>
      </div>
      <div class="git-status-badge" id="gitStatus">
        <span class="status-dot"></span>
        <span class="status-text">GitHub 연동 대기중</span>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Left: Pitch -->
      <section class="pitch-section">
        <div class="pitch-container">
          <div class="pitch" id="pitch">
            <!-- Pitch lines (drawn via CSS/SVG) -->
            <div class="pitch-line half-way"></div>
            <div class="pitch-line center-circle"></div>
            <div class="pitch-line penalty-area top"></div>
            <div class="pitch-line penalty-area bottom"></div>
            <div class="pitch-line goal-area top"></div>
            <div class="pitch-line goal-area bottom"></div>

            <!-- Position Guides (Dynamically rendered based on selected formation) -->
            <div class="guides-overlay" id="guidesOverlay"></div>
            
            <!-- Placed Players (Dynamically added here) -->
            <div class="players-overlay" id="playersOverlay"></div>
          </div>
        </div>
      </section>

      <!-- Right: Control Panel & Squad -->
      <section class="control-section">
        <!-- Tactics Selector -->
        <div class="panel tactics-panel">
          <h2 class="panel-title">전술 포메이션</h2>
          <div class="tactics-buttons">
            <button class="tactics-btn active" data-formation="4-4-2">4-4-2</button>
            <button class="tactics-btn" data-formation="4-3-3">4-3-3</button>
            <button class="tactics-btn" data-formation="3-5-2">3-5-2</button>
            <button class="tactics-btn" data-formation="4-2-3-1">4-2-3-1</button>
            <button class="tactics-btn" data-formation="5-3-2">5-3-2</button>
          </div>
        </div>

        <!-- Squad List -->
        <div class="panel squad-panel">
          <div class="panel-header">
            <h2 class="panel-title">선수 명단 (<span id="squadCount">0</span>명)</h2>
            <input type="text" id="playerSearch" class="search-input" placeholder="선수 이름 검색...">
          </div>
          <div class="squad-list" id="squadList">
            <!-- Player items will be rendered here -->
            <div class="loading">선수 명단을 불러오는 중...</div>
          </div>
        </div>

        <!-- Save Button -->
        <div class="action-panel">
          <button id="saveBtn" class="save-button">
            <svg class="save-icon" viewBox="0 0 24 24" width="20" height="20">
              <path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM19 18H6c-2.21 0-4-1.79-4-4 0-2.05 1.53-3.76 3.56-3.97l1.07-.11.5-.95C8.08 7.14 9.94 6 12 6c2.62 0 4.88 1.86 5.39 4.43l.3 1.5 1.53.11c1.56.1 2.78 1.41 2.78 2.96 0 1.65-1.35 3-3 3zm-5.55-8h-2.9v3H7.5l4.5 4.5 4.5-4.5h-3.05z"/>
            </svg>
            <span>포메이션 저장 및 깃허브 푸시</span>
          </button>
        </div>
      </section>
    </main>

    <!-- Overlay Loader for saving/pushing -->
    <div class="overlay-loader" id="overlayLoader">
      <div class="loader-content">
        <div class="spinner"></div>
        <h3 id="loaderTitle">포메이션 저장 중...</h3>
        <p id="loaderDesc">서버에 저장하고 깃허브로 푸시하고 있습니다.</p>
        <div class="console-box" id="consoleBox"></div>
        <button id="closeLoaderBtn" class="close-loader-btn" style="display: none;">확인</button>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="app.js"></script>
</body>
</html>
